<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--tailwind+daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!--font_link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--fontawesome_icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Github Issue Traker</title>
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <!--loginpage-->
    <div class="min-h-screen flex justify-center items-center">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-sm p-5">
            <div class="max-w-md grid items-center justify-center text-center">
                <div class="flex justify-center mb-4">
                    <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16">
                </div>
                <h3 class="font-bold">GitHub Issues Tracker</h3>
                <p>Sign in to manage your issues</p>
            </div>
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label">username</label>
                    <input type="text" class="input" placeholder="username" />
                    <label class="label">Password</label>
                    <input type="password" class="input" placeholder="Password" />
                    <button class="btn btn-primary mt-4">Login</button>
                </fieldset>
                <div class="text-center">
                    OR
                </div>
                <div class="text-center">
                    <p>Demo Credentials:</p>
                    <p class="font-semibold">Username: admin <br>
                        Password: admin123
                    </p>
                </div>
            </div>
        </div>

</body>

</html>
