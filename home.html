<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--tailwind+daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!--font_link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!--fontawesome_icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Github Issue Traker</title>
    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        .open {
            border-top: 5px solid #00A96E;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <nav class="flex justify-between p-5 bg-white">
        <div class="flex justify-center items-center gap-3">
            <img src="./assets/github-logo.png" alt="" class="w-10">
            <h2 class="font-bold">Github Issues Traker</h2>
        </div>
        <div>
            <div class="join gap-4">
                <div>
                    <label class="input validator join-item rounded-sm">
                        <input type="text" placeholder="🔍︎ search issues" required />
                    </label>
                </div>
                <button class="btn btn-primary join-item rounded-sm">+ New Issue</button>
            </div>
        </div>
    </nav>
    <div class="w-5/6 mx-auto bg-white p-5 mt-14 rounded-sm shadow-sm">
        <button class="btn btn-primary">All</button>
        <button class="btn btn-nutral">Open</button>
        <button class="btn btn-nutral">Closed</button>
    </div>
    <div class="w-5/6 mx-auto bg-white rounded-sm shadow-sm mt-5">
        <div class="flex justify-between p-5 border-b-2 border-b-black/10">
            <div class="flex gap-3 justify-center items-center">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="font-bold">50 Issues</h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex gap-3 justify-center items-center">
                    <div class="rounded-full bg-[#00A96E] w-4 h-4"></div>
                    <p>open</p>
                </div>
                <div class="flex gap-3 justify-center items-center">
                    <div class="rounded-full bg-[#A855F7] w-4 h-4"></div>
                    <p>Close</p>
                </div>
            </div>
        </div>
        <!--issue cards-->
        <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-5 gap-3">
            <div class="bg-white w-full rounded-b-md shadow-lg p-5 open space-y-5">
                <div class="space-y-5">
                    <div class="flex justify-between">
                        <img src="./assets/Open-Status.png" alt="" class="w-8 cuusor-pointer" onclick="my_modal_5.showModal()">
                        <button class="btn btn-soft btn-error rounded-full">HIGH</button>
                    </div>
                    <h2 class="font-bold">Fix navigation menu on mobile devices</h2>
                    <p>The navigation menu doesn't collapse properly on mobile devices...</p>
                    <div class="flex gap-2">
                        <button class="btn btn-outline btn-error rounded-full text-red">BUG</button>
                        <button class="btn btn-outline btn-warning rounded-full text-[#D97706]">HELP NEEDED</button>
                    </div>
                </div>
                <hr class="border-1 border-black/10 w-full inline-block">
                <div>
                    <p>#1by john_doe</p>
                    <p>1/15/2024</p>
                </div>
            </div>
        </div>
    </div>
    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <h3 class="text-lg font-bold">Hello!</h3>
            <p class="py-4">Press ESC key or click the button below to close</p>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>
</body>

</html>
